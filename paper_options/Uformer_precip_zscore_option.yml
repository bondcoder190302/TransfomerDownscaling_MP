# Configuration for single-variable precipitation downscaling.
# Input : ERA5 Land daily precipitation at 0.1° (36x36 for region [76,21,79.2,24.2])
# Target: CHIRPS daily precipitation at 0.05° (64x64)
# Auxiliary: Copernicus GLO-90 DEM elevation (64x64, static)
# Scale factor: 2× (0.1° → 0.05°)

name: Uformer_precip_ep120_2e4lr_c128_zscore_x2_hgtxcoder
model_type: ClimateUformerMultiscaleFuseModel
scale: 2
num_gpu: 0  # set num_gpu: 0 for cpu mode
manual_seed: 0
fp16: false

# Debug / stability flags (all off by default; set true only for debugging)
anomaly_detection: false   # torch.autograd.set_detect_anomaly – expensive, off by default
finite_debug: false        # enable _assert_finite / debug_finite_checks in arch/MLP forward passes
freeze_layernorm: false    # freeze LayerNorm affine params permanently (debug aid, not for production)

# LayerNorm affine warmup freeze: freeze LN affine params for the first N iterations then
# automatically unfreeze them.  Set to 0 (default) to disable.
# At LR=2e-4, ~100 iters gives the main network weights enough time to stabilise before
# LN affine params start adapting.  A per-LN gradient clamp (max_norm=0.1 in
# optimize_parameters) provides an additional safety net after the unfreeze.
# (30 iters was too short: instability at encoderlayer_0.blocks.0.norm1.weight was
# observed immediately after unfreeze, suggesting the skip-rate target of <5% requires
# a longer warmup at higher learning rates.)
ln_freeze_iters: 100

# Per-encoder0 LN freeze: keep encoderlayer_0 LayerNorm affine params frozen for longer
# than the rest of the network.  encoderlayer_0 is the shallowest (and therefore most
# sensitive) encoder block; its LN affine params are the most common non-finite grad
# hotspot after unfreeze.  Set to 0 to use the same schedule as ln_freeze_iters.
# Effective only when > ln_freeze_iters; otherwise ln_freeze_iters governs both.
freeze_encoder0_layernorm_warmup_iters: 150

# Attention bias table freeze: freeze all relative_position_bias_table parameters for
# the first N iterations.  These tables are the *earliest* gradient explosion hotspot
# (seen at iter 1–15 with 73–150+ non-finite grad params in training logs).  Freezing
# them during the critical first few iterations eliminates that hotspot entirely.
# The tables are initialised with trunc_normal(std=0.02) which is safe but can receive
# extreme incoming gradients before the rest of the network has settled.
# Set to 0 to disable (default = enabled at 30 iters for conservative safety margin).
freeze_attention_bias_warmup_iters: 30

# Gradient-fix strategy: if ≤ grad_fix_max_bad_params parameters have NaN/Inf
# gradients at a given iteration, zero those individual gradients and proceed rather
# than skipping the whole step.  This prevents isolated LN affine NaN events
# (typically at encoderlayer_0.blocks.0.norm1.weight immediately post-unfreeze) from
# discarding otherwise valid batch updates.  Set to 0 to revert to full-skip behaviour.
# Only used when nonfinite_policy: 'skip'.
grad_fix_max_bad_params: 3

# Non-finite gradient policy.
#   'skip'               (default): use the fixed grad_fix_max_bad_params count threshold.
#                         Skip the whole step if > threshold bad-grad params; otherwise
#                         zero isolated bad grads and proceed.
#   'sanitize_then_step': use a ratio-based threshold instead of a fixed count.
#                         Zero all non-finite grads and step if fraction ≤
#                         nonfinite_param_ratio_threshold; skip otherwise.
#                         More robust at large model sizes where a fixed count is arbitrary.
nonfinite_policy: skip

# Fraction of parameters allowed to have non-finite gradients before the step is skipped
# in 'sanitize_then_step' mode.  0.05 = up to 5% of parameters may have bad grads.
# Ignored when nonfinite_policy is 'skip'.
nonfinite_param_ratio_threshold: 0.05

# Optional per-group gradient clip for relative_position_bias_table parameters.
# These small tables (225 × nH floats) are the earliest gradient explosion hotspot
# and benefit from a tighter clip than the global max_norm=1.0.
# Set to null to disable (global clip applies only).
# Recommended value when enabled: 0.5 (tighter than global but looser than LN clip).
clip_grad_relative_position_bias: 0.5

# dataset and data loader settings
datasets:
  common:
    name: Precip
    type: MergeDataset
    dirName_stat: ./DownScale_Paper/param_stat_12_36/
    dirName_data: ./DownScale_Paper/
    # One ERA5 Land precipitation variable (1 channel)
    listofVar: [ERA5_precip_cut_log1p]
    # CHIRPS precipitation is the super-resolution target (1 channel)
    varName_gt: [CHIRPS_precip_cut_obs_log1p]
    # Maps model output channel 0 → listofVar[0] for bicubic baseline comparison
    index_gt: [0]
    radar_file: ./DownScale_Paper/DownScale_Correction_split/data.txt
    normalize: 'zscore'
    # Copernicus DEM elevation used as auxiliary static input
    hgt_obs: 'HGT_fix_cut_obs'
    # 'date' format: each .npy file is named YYYYMMDD.npy (no area/lead-hour suffix)
    file_format: 'date'
    # Name of the single static elevation file inside HGT_fix_cut_obs/
    fix_file_name: 'HGT_fix.npy'
    seq_length: 1
    seq_interval: 1
  train:
    train_file: ./DownScale_Paper/DownScale_Correction_split/train_12_36.txt
    # dataloader
    use_shuffle: true
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    randomcrop: false
    # Full HR image size (64 px at 0.05°); LQ crop = gt_size / scale = 36
    gt_size: 64
    prefetch_mode: ~

  val:
    seq_interval: 1
    train_file: ./DownScale_Paper/DownScale_Correction_split/val_12_36.txt

#  test:
#    seq_interval: 1
#    train_file: ./DownScale_Paper/DownScale_Correction_split/val_12_36.txt

# network structures
network_g:
  type: ClimateUformerMultiScaleHGTMultiScaleOut
  add_hgt: True
  upscale: 2
  num_in_ch: 1   # ERA5 precipitation (1 channel)
  num_out_ch: 1  # CHIRPS precipitation (1 channel)
  img_size: 32   # LR input spatial size (gt_size / scale = 64 / 2)
  window_size: 8
  depths: [2, 2, 2, 2, 2]
  embed_dim: 128
  num_heads: [4, 8, 16, 16, 8]
  mlp_ratio: 4
  token_projection: 'linear'
  token_mlp: 'leff'
  activation: none
  multi_add_pos: 'xcoder'
  # Set drop_path_rate=0.0 to disable stochastic depth.
  # Stochastic depth amplifies residual-path gradients stochastically (factor 1/(1-p)),
  # which compounds across depth-5 encoder blocks and drives norm1.weight gradients NaN.
  drop_path_rate: 0.0

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 2e-4  # matches original Uformer paper; stable with _init_weights + clamp guards
    # betas: beta2=0.95 (vs default 0.999) gives a ~20-step effective window for the second
    # moment, making the adaptive rate respond more quickly to recent gradient magnitudes.
    # This helps escape the near-flat loss plateau seen with the standard beta2=0.999.
    betas: [0.9, 0.95]
    eps: !!float 1e-6  # increased from PyTorch default 1e-8 for numerical stability on CPU

  # 74 training samples, batch_size=2 → 37 iter/epoch; 120 epochs → 4440 total_iter
  # Milestones at 50 %, 80 %, 90 %, 95 % of total_iter.
  # For total_iter=400 debug run: 200, 320, 360, 380.
  # For full run (total_iter=4440): use [2220, 3552, 3996, 4218].
  scheduler:
    type: MultiStepLR
    milestones: [200, 320, 360, 380]
    gamma: 0.5

  # Stability debug run: 400 iters (~11 epochs at batch_size=2) is enough to observe
  # skip-rate recovery and metric movement with the combined stability fixes.
  # Restore to 4440 for full 120-epoch production training.
  total_iter: 400
  warmup_iter: 50  # linear LR ramp from 0 → lr over first 50 iters (within LN freeze window)

  # losses
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 10
    reduction: mean

# validation settings
val:
  val_freq: 20
  save_img: false
  save_npy: false
  save_npy_onlyoutput: true
  pbar: true

  metrics:
    psnr:
      type: calculate_climate_psnr
      crop_border: 0   # images are small (80×80), no border to crop
    mse:
      type: calculate_climate_mse
      crop_border: 0
      #better: lower
    mae:
      type: calculate_climate_mae
      crop_border: 0
      #better: lower

# logging settings
logger:
  print_freq: 5
  save_checkpoint_freq: 20
  use_tb_logger: true

# dist training settings
dist_params:
  backend: nccl
  port: 29500
