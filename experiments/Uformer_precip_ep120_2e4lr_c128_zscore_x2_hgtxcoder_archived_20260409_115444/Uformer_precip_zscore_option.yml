# GENERATE TIME: Thu Apr  9 11:18:40 2026
# CMD:
# train.py -opt paper_options/Uformer_precip_zscore_option.yml

# Configuration for single-variable precipitation downscaling.
# Input : ERA5 Land daily precipitation at 0.1° (40×40 for region [76,21,80,25])
# Target: CHIRPS daily precipitation at 0.05° (80×80)
# Auxiliary: Copernicus GLO-90 DEM elevation (80×80, static)
# Scale factor: 2× (0.1° → 0.05°)

name: Uformer_precip_ep120_2e4lr_c128_zscore_x2_hgtxcoder
model_type: ClimateUformerModel
scale: 2
num_gpu: 0  # set num_gpu: 0 for cpu mode
manual_seed: 0
fp16: false

# dataset and data loader settings
datasets:
  common:
    name: Precip
    type: MergeDataset
    dirName_stat: ./DownScale_Paper/param_stat_12_36/
    dirName_data: ./DownScale_Paper/
    # One ERA5 Land precipitation variable (1 channel)
    listofVar: [ERA5_precip_cut]
    # CHIRPS precipitation is the super-resolution target (1 channel)
    varName_gt: [CHIRPS_precip_cut_obs]
    # Maps model output channel 0 → listofVar[0] for bicubic baseline comparison
    index_gt: [0]
    radar_file: ./DownScale_Paper/DownScale_Correction_split/data.txt
    normalize: 'zscore'
    # Copernicus DEM elevation used as auxiliary static input
    hgt_obs: 'HGT_fix_cut_obs'
    # 'date' format: each .npy file is named YYYYMMDD.npy (no area/lead-hour suffix)
    file_format: 'date'
    # Name of the single static elevation file inside HGT_fix_cut_obs/
    fix_file_name: 'HGT_fix.npy'
    seq_length: 1
    seq_interval: 1
  train:
    train_file: ./DownScale_Paper/DownScale_Correction_split/train_12_36.txt
    # dataloader
    use_shuffle: true
    num_worker_per_gpu: 2
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    randomcrop: false
    # Full HR image size (80 px at 0.05°); LQ crop = gt_size / scale = 40
    gt_size: 64
    prefetch_mode: ~

  val:
    seq_interval: 1
    train_file: ./DownScale_Paper/DownScale_Correction_split/val_12_36.txt

#  test:
#    seq_interval: 1
#    train_file: ./DownScale_Paper/DownScale_Correction_split/val_12_36.txt

# network structures
network_g:
  type: ClimateUformerMultiScaleHGT
  add_hgt: False
  upscale: 2
  num_in_ch: 1   # ERA5 precipitation (1 channel)
  num_out_ch: 1  # CHIRPS precipitation (1 channel)
  img_size: 32   # LR input spatial size (gt_size / scale = 80 / 2)
  window_size: 8
  depths: [2, 2, 2, 2, 2]
  embed_dim: 128
  num_heads: [4, 8, 16, 16, 8]
  mlp_ratio: 4
  token_projection: 'linear'
  token_mlp: 'leff'
  activation: none
  multi_add_pos: 'xcoder'

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 5e-5
    betas: [0.9, 0.99]

  # 74 training samples, batch_size=4 → 19 iter/epoch; 120 epochs → 2280 total_iter
  # Milestones at 50 %, 80 %, 90 %, 95 % of total_iter
  scheduler:
    type: MultiStepLR
    milestones: [1140, 1824, 2052, 2166]
    gamma: 0.5

  total_iter: 2280   # 120 epochs
  warmup_iter: -1

  # losses
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 10
    reduction: mean

# validation settings
val:
  val_freq: 19       # validate every epoch (19 iter/epoch)
  save_img: false
  save_npy: true
  save_npy_onlyoutput: true
  pbar: true

  metrics:
    psnr:
      type: calculate_climate_psnr
      crop_border: 0   # images are small (80×80), no border to crop
    mse:
      type: calculate_climate_mse
      crop_border: 0
      better: lower
    mae:
      type: calculate_climate_mae
      crop_border: 0
      better: lower

# logging settings
logger:
  print_freq: 10
  save_checkpoint_freq: 190  # save every 10 epochs
  use_tb_logger: true

# dist training settings
dist_params:
  backend: nccl
  port: 29500
